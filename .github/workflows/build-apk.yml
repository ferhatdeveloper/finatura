name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    paths:
      - "apps/mobile/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: finatura-android-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Publish stable apk-latest release
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Finatura Android APK (latest)
          body: |
            CI tarafından üretilen release APK (debug keystore ile imzalı).
            Play Store dağıtımı için uygun değildir.

            İndir: [app-release.apk](https://github.com/ferhatdeveloper/finatura/releases/download/apk-latest/app-release.apk)
          prerelease: true
          files: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}