# Finatura API Gateway — Dokploy (RetailEX/Kargo ile çakışmaz)
#
#   - Ağ: berqenas_net
#   - Servis: finatura_api (host port YOK — :3000 yalnızca internal)
#   - DB: finatura_pg (docker-compose.pg.yml) — asla saas_postgres / kargomkapinda_*
#   - Domains → finatura_api · port 3000 · api.finatura.app
#
# Önkoşul: docker-compose.pg.yml deploy edilmiş olmalı (aynı berqenas_net).
#
# Dokploy Environment (önerilen):
#   POSTGRES_PASSWORD=<pg ile aynı>
#   JWT_SECRET=<güçlü-32+>
#   AUTH_PROVIDER=central
#   CENTRAL_DATABASE_URL=postgresql://finatura:<şifre>@finatura_pg:5432/finatura_central
#   OPENROUTER_API_KEY=sk-or-v1-...
#   LLM_ENABLED=true
#   LLM_PROVIDER=openrouter
#
# Yerel: docker compose -f docker-compose.api.yml -f docker-compose.api.local.yml up -d --build

services:
  finatura_api:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    image: finatura-api:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Central DB (finatura_pg). Stub için AUTH_PROVIDER=stub
      AUTH_PROVIDER: ${AUTH_PROVIDER:-central}
      CENTRAL_DATABASE_URL: ${CENTRAL_DATABASE_URL:-postgresql://finatura:${POSTGRES_PASSWORD:-finatura_change_me_in_dokploy}@finatura_pg:5432/finatura_central}
      JWT_SECRET: ${JWT_SECRET:-finatura-prod-change-me-min-32-chars!!}
      JWT_ISSUER: ${JWT_ISSUER:-finatura.api-gateway}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-finatura.app}
      AUTH_STUB_EMAIL: ${AUTH_STUB_EMAIL:-demo@finatura.app}
      AUTH_STUB_PASSWORD: ${AUTH_STUB_PASSWORD:-demo1234}
      AUTH_STUB_FIRMA_KODU: ${AUTH_STUB_FIRMA_KODU:-DEMO-GALERI}
      AUTH_STUB_ROLE: ${AUTH_STUB_ROLE:-owner}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://finatura.app,https://www.finatura.app,https://app.finatura.app,https://login.finatura.app,https://mm.finatura.app}
      # Docker/Dokploy internal DNS — asla 127.0.0.1 kullanma
      TENANT_ROUTER_URL: ${TENANT_ROUTER_URL:-http://finatura_router:3100}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-}
      # OpenRouter OCR LLM (document-agent GET /v1/admin/llm-config)
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - berqenas_net

networks:
  berqenas_net:
    external: true
    name: berqenas_net
