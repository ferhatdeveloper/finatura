server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA routing: client-side paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Safety: no caching of HTML shell
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
