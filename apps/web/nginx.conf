server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Gzip static assets
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers (TLS terminates at Dokploy/Traefik)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Dokploy / container healthcheck
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Hashed Vite assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Large video — cache but allow range requests
    location /video/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # SPA routing: client-side paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Safety: no caching of HTML shell
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
