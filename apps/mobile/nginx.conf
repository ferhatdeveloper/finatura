server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Dokploy / container healthcheck
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Flutter compiled assets + canvaskit — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA routing: Flutter client-side paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Safety: no caching of HTML shell
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
