name: finatura_mobile
description: Finatura Flutter istemcisi — OCR, banka eşleştirme ve veresiye mahsup.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.5.5

  # Gerçek kamera / galeri (AŞAMA 2.4) — SCAN_NATIVE_CAMERA varsayılan true
  camera: ^0.11.0+2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
