# Finatura marketing site — Dokploy / yerel Docker Compose
#
# Dokploy: Compose path = docker-compose.web.yml
#   Domains → servis: web · port: 80 (Traefik etiketlerini Dokploy ekler)
#
# Yerel doğrulama:
#   docker compose -f docker-compose.web.yml -f docker-compose.web.local.yml up -d --build
#   http://localhost:8080

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: finatura-web:latest
    restart: unless-stopped
    # Konteyner portu 80 — host bağlama yok (Dokploy/Traefik için doğru biçim)
    ports:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
