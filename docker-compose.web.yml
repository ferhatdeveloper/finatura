# Finatura marketing site — Dokploy / yerel Docker Compose
#
# Dokploy production: ./docker-compose.dokploy.yml (berqenas_net, finatura_web)
# Bu dosya yerel / basit Compose için.
#
# Yerel: docker compose -f docker-compose.web.yml -f docker-compose.web.local.yml up -d --build
# Not: apps/dashboard (operasyon paneli) bu compose’a dahil değildir.

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_APP_URL: ${VITE_APP_URL:-https://login.finatura.app}
    image: finatura-web:latest
    restart: unless-stopped
    # Konteyner portu 80 — host bağlama yok (Dokploy/Traefik)
    ports:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
