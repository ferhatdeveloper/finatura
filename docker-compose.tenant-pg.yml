# Finatura Tenant PostgreSQL — demo / tek-tenant (RetailEX / Kargo ile ÇAKIŞMAZ)
#
#   - Servis: finatura_tenant_pg
#   - Volume: finatura_tenant_pg_data
#   - Ağ: berqenas_net
#   - Host port: YOK
#   - DB: tenant_ornek
#
# Central kayıt: database/central/10_seed_tenant_database.sql
# Init şema: database/tenant_template/*.sql

services:
  finatura_tenant_pg:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TENANT_POSTGRES_DB:-tenant_ornek}
      POSTGRES_USER: ${TENANT_POSTGRES_USER:-finatura}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finatura_change_me_in_dokploy}
      PGDATA: /var/lib/postgresql/data/pgdata
    expose:
      - "5432"
    volumes:
      - finatura_tenant_pg_data:/var/lib/postgresql/data
      - ./database/tenant_template:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - berqenas_net

volumes:
  finatura_tenant_pg_data:
    name: finatura_tenant_pg_data

networks:
  berqenas_net:
    external: true
    name: berqenas_net
