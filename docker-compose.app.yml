# Finatura Flutter Web app — Dokploy (RetailEX/Kargo ile çakışmaz)
#
#   - Ağ: berqenas_net
#   - Servis: finatura_app (host port YOK — RetailEX :8080 korunur)
#   - Domains → finatura_app · port 80 · app.finatura.app + login.finatura.app
#
# Yerel: docker compose -f docker-compose.app.yml -f docker-compose.app.local.yml up -d --build

services:
  finatura_app:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile
    image: finatura-app:latest
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - berqenas_net

networks:
  berqenas_net:
    external: true
    name: berqenas_net
